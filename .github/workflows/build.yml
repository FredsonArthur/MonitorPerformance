name: Build e Release v1.1.4

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build e Setup Windows
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install psutil pyinstaller pillow

    - name: Gerar Executável (PyInstaller)
      run: pyinstaller --noconsole --onedir --name "MonitorPerformance_v1.1.4" --icon="src/assets/monitor.ico" --version-file="src/file_version_info.txt" --add-data "src;src" src/gadget_view.py

    # LINHA 38 CORRIGIDA: Usando o compilador nativo do Inno Setup no Runner do Windows
    - name: Compilar Instalador (Inno Setup)
      shell: pwsh
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Upload do Artefato (Para inspeção)
      uses: actions/upload-artifact@v4
      with:
        name: MonitorPerformance-Setup-v1.1.4
        path: Output/Setup_MonitorPerformance_v1.1.4.exe

    - name: Criar Release Oficial
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: Output/Setup_MonitorPerformance_v1.1.4.exe
        name: Release ${{ github.ref_name }}
        body: |
          ## Monitor de Performance v1.1.4
          - **Novo Instalador Oficial**: Processo de instalação padrão Windows (.exe).
          - **Segurança**: Build realizado em ambiente limpo via GitHub Actions.
          - **Facilidade**: Atalhos automáticos no Menu Iniciar e Área de Trabalho.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}