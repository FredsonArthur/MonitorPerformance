name: Build Multi-Plataforma v1.1.0

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build para ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install psutil pyinstaller pillow

    - name: Gerar Executável (Windows)
      if: matrix.os == 'windows-latest'
      # No PowerShell, é mais seguro manter o comando em uma linha ou usar o operador de escape correto
      run: pyinstaller --noconsole --onedir --name "MonitorPerformance_v1.1.0" --icon="src/assets/monitor.ico" --version-file="src/file_version_info.txt" --add-data "src;src" src/gadget_view.py

    - name: Gerar Executável (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --noconsole --onefile --name "MonitorPerformance_Linux" --add-data "src:src" src/gadget_view.py

    - name: Upload do Artefato
      uses: actions/upload-artifact@v4
      with:
        name: MonitorPerformance-${{ matrix.os }}
        path: dist/*