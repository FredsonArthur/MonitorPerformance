name: Build e Release v1.1.5

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build e Setup Windows
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        # Necessário pywin32 e wmi para métricas de FPS e Temperatura
        pip install psutil pyinstaller pillow pywin32 wmi

    - name: Gerar Executável (PyInstaller)
      run: pyinstaller --noconsole --onedir --uac-admin --name "MonitorPerformance_v1.1.5" --icon="src/assets/monitor.ico" --version-file="src/file_version_info.txt" --add-data "src;src" src/gadget_view.py

    - name: Compilar Instalador (Inno Setup)
      shell: pwsh
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Localizar e Validar Instalador
      id: locate_exe
      shell: pwsh
      run: |
        # Busca dinâmica para evitar erros de caminho estático
        $installer = Get-ChildItem -Path "Output/Setup_*.exe" | Select-Object -First 1
        if ($null -eq $installer) {
          Write-Error "O Inno Setup nao gerou o instalador na pasta Output!"
          exit 1
        }
        Write-Host "Sucesso: Instalador encontrado em $($installer.FullName)"
        # Exporta o caminho para os próximos passos
        echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_ENV

    - name: Criar Release Oficial
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        # Usa a variável dinâmica definida no passo anterior
        files: ${{ env.INSTALLER_PATH }}
        name: Release ${{ github.ref_name }}
        body: |
          ## 🚀 Monitor de Performance v1.1.5
          - **Monitoramento de FPS**: Captura em tempo real da taxa de quadros.
          - **Telemetria Térmica**: Visualização de temperatura da CPU integrada.
          - **Instalador Automatizado**: Gerado via GitHub Actions.
          - **Melhorias de UI**: Layout otimizado para as novas métricas.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}