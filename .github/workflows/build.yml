name: Build Multi-Plataforma

on:
  push:
    branches: [ main ] # Roda sempre que você der push na main

jobs:
  build:
    name: Build para ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install psutil pyinstaller

    - name: Gerar Executável (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --onefile --add-data "src;src" src/gadget_view.py

    - name: Gerar Executável (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --noconsole --onefile --add-data "src:src" src/gadget_view.py

    - name: Upload do Artefato
      uses: actions/upload-artifact@v4
      with:
        name: gadget-${{ matrix.os }}
        path: dist/*