name: Build e Release v1.1.3

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build para ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install psutil pyinstaller pillow

    - name: Gerar Executável (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --onedir --name "MonitorPerformance_v1.1.3" --icon="src/assets/monitor.ico" --version-file="src/file_version_info.txt" --add-data "src;src" src/gadget_view.py

    - name: Criar ZIP para Distribuição (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      # Usamos o wildcard \* para zipar o CONTEÚDO da pasta, evitando pastas aninhadas desnecessárias
      run: Compress-Archive -Path dist/MonitorPerformance_v1.1.3\* -DestinationPath dist/MonitorPerformance_Windows_v1.1.3.zip

    - name: Gerar Executável (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --noconsole --onefile --name "MonitorPerformance_Linux_v1.1.3" --add-data "src:src" src/gadget_view.py

    # CORREÇÃO DO DUPLO ZIP: Usamos a versão v4+ do upload-artifact que lida melhor com isso
    - name: Upload do Artefato
      uses: actions/upload-artifact@v4
      with:
        name: MonitorPerformance-${{ matrix.os }}-v1.1.3
        path: |
          dist/*.zip
          dist/MonitorPerformance_Linux_v1.1.3
        if-no-files-found: error

    - name: Criar Release Oficial
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/MonitorPerformance_Windows_v1.1.3.zip
        name: Release ${{ github.ref_name }}
        body: |
          ## Monitor de Performance v1.1.3
          - Correção da estrutura de compressão (fim do "duplo zip").
          - Compilação limpa via GitHub Actions.
          - Redução de falsos positivos via ofuscação técnica.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}