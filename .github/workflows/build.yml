name: Build e Release v1.1.2

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Dispara o workflow quando uma tag começando com 'v' é criada

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    name: Build para ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install psutil pyinstaller pillow

    - name: Gerar Executável (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --onedir --name "MonitorPerformance_v1.1.2" --icon="src/assets/monitor.ico" --version-file="src/file_version_info.txt" --add-data "src;src" src/gadget_view.py

    - name: Compactar Pasta (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: Compress-Archive -Path dist/MonitorPerformance_v1.1.2/* -DestinationPath dist/MonitorPerformance_Windows_v1.1.2.zip

    - name: Gerar Executável (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --noconsole --onefile --name "MonitorPerformance_Linux_v1.1.2" --add-data "src:src" src/gadget_view.py

    - name: Upload do Artefato (GitHub Actions)
      uses: actions/upload-artifact@v4
      with:
        name: MonitorPerformance-${{ matrix.os }}
        path: dist/*.zip
        if-no-files-found: ignore

    - name: Criar Release Oficial
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/MonitorPerformance_Windows_v1.1.2.zip
        name: Release ${{ github.ref_name }}
        body: |
          ## Monitor de Performance v1.1.2
          Versão gerada em ambiente limpo e automatizado.
          
          ### Mudanças:
          - Ofuscação de telemetria para redução de falsos positivos (Wacatac).
          - Delay de inicialização de 1.5s.
          - Distribuição oficial via GitHub Release.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}